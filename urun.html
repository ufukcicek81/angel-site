<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel Privé | Ürün Detayı</title>
  <meta name="description" content="Angel Privé özel dikim kıyafet ürün detayı, galeri ve kumaş bilgileri." />
  <meta name="robots" content="index,follow" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --black:#050505;
      --soft:#0c0a08;
      --gold:#c99a45;
      --gold2:#efd27a;
      --line:rgba(232,199,119,.24);
      --muted:rgba(255,255,255,.68);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,sans-serif;
      background:
        radial-gradient(circle at 70% 10%,rgba(201,154,69,.13),transparent 32%),
        linear-gradient(135deg,#050505,#120f0b 55%,#050505);
      color:#fff;
      line-height:1.55;
      min-height:100vh;
    }
    .top{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(5,5,5,.82);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    .top-inner{
      width:min(1180px,92%);
      margin:auto;
      padding:14px 0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .brand{
      font-family:'Cormorant Garamond',serif;
      color:var(--gold2);
      font-size:30px;
      letter-spacing:.10em;
      text-decoration:none;
      white-space:nowrap;
    }
    .nav-btn{
      color:#fff;
      text-decoration:none;
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      font-weight:900;
      font-size:13px;
      background:rgba(255,255,255,.04);
    }
    .wrap{width:min(1180px,92%);margin:auto;padding:24px 0 70px}
    .grid{display:grid;grid-template-columns:1fr .92fr;gap:30px;align-items:start}
    .gallery-card,.info{
      background:rgba(255,255,255,.045);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:0 24px 80px rgba(0,0,0,.32);
      overflow:hidden;
    }
    .main-photo{
      background:#080808;
      min-height:650px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .main-photo img{
      width:100%;
      height:100%;
      min-height:650px;
      object-fit:cover;
      object-position:center top;
      display:block;
    }
    .thumbs{
      display:flex;
      gap:10px;
      overflow:auto;
      padding:14px;
      background:rgba(0,0,0,.35);
      border-top:1px solid var(--line);
    }
    .thumbs img{
      width:74px;
      height:96px;
      object-fit:cover;
      border-radius:14px;
      border:2px solid transparent;
      cursor:pointer;
      flex:0 0 auto;
      background:#111;
    }
    .thumbs img.active{border-color:var(--gold2)}
    .info{padding:30px}
    .eyebrow{
      color:var(--gold2);
      font-weight:900;
      letter-spacing:.24em;
      font-size:12px;
      text-transform:uppercase;
      margin-bottom:12px;
    }
    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(44px,6vw,74px);
      line-height:.95;
      margin-bottom:18px;
      color:#fff;
    }
    .desc{
      color:var(--muted);
      font-size:17px;
      margin-bottom:24px;
    }
    .specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
    .spec{
      border:1px solid rgba(232,199,119,.18);
      border-radius:18px;
      padding:15px;
      background:rgba(0,0,0,.26);
    }
    .spec strong{display:block;color:var(--gold2);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
    .spec span{color:rgba(255,255,255,.82);font-weight:700}
    .detail{
      margin-top:20px;
      color:rgba(255,255,255,.72);
      white-space:pre-wrap;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:18px;
    }
    .btns{display:grid;gap:12px;margin-top:24px}
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:18px;
      padding:17px 18px;
      text-decoration:none;
      font-weight:900;
      font-size:16px;
    }
    .gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
    .dark{background:#050505;color:#fff;border:1px solid var(--line)}
    .mobile-back{display:none}
    @media(max-width:820px){
      .top-inner{padding:12px 0}
      .brand{font-size:25px}
      .nav-btn{font-size:12px;padding:9px 12px}
      .wrap{padding-top:18px}
      .grid{grid-template-columns:1fr;gap:18px}
      .gallery-card{border-radius:26px}
      .main-photo{min-height:500px}
      .main-photo img{min-height:500px}
      .info{padding:22px;border-radius:26px}
      .specs{grid-template-columns:1fr}
      .mobile-back{display:flex}
      .desktop-back{display:none}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="./index.html">ANGEL PRIVÉ</a>
      <a class="nav-btn desktop-back" href="./index.html">Ana sayfa</a>
      <a class="nav-btn mobile-back" href="./index.html">←</a>
    </div>
  </header>

  <main class="wrap">
    <section class="grid">
      <div class="gallery-card">
        <div class="main-photo"><img id="mainPhoto" alt="Ürün görseli"></div>
        <div class="thumbs" id="thumbs"></div>
      </div>

      <div class="info">
        <div class="eyebrow" id="category">Özel dikim</div>
        <h1 id="title">Ürün yükleniyor...</h1>
        <p class="desc" id="desc"></p>

        <div class="specs">
          <div class="spec"><strong>Kumaş</strong><span id="fabric">-</span></div>
          <div class="spec"><strong>Model</strong><span id="model">-</span></div>
          <div class="spec"><strong>Ölçü</strong><span id="measure">-</span></div>
          <div class="spec"><strong>Teslim</strong><span id="delivery">-</span></div>
        </div>

        <div class="detail" id="detail"></div>

        <div class="btns">
          <a class="btn gold" id="waBtn" href="#" target="_blank">Bu tasarım için teklif al</a>
          <a class="btn dark" href="./index.html">Diğer tasarımları incele</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./urun.js"></script>
</body>
</html>
