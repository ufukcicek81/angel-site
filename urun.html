<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel Privé | Ürün Detayı</title>
  <meta name="description" content="Angel Privé özel dikim kıyafet ürün detayı, galeri ve kumaş bilgileri." />
  <meta name="robots" content="index,follow" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--black:#050505;--gold:#c99a45;--gold2:#efd27a;--cream:#f8f4ec;--muted:#777}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:var(--cream);color:#111;line-height:1.55}
    .top{background:#050505;padding:18px 0;text-align:center;border-bottom:1px solid rgba(201,154,69,.22)}
    .top a{font-family:'Cormorant Garamond',serif;color:var(--gold2);font-size:34px;text-decoration:none;letter-spacing:.08em}
    .wrap{width:min(1180px,92%);margin:auto;padding:34px 0 70px}
    .back{display:inline-flex;margin-bottom:18px;color:#111;text-decoration:none;font-weight:800}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:start}
    .main-photo{background:#080808;border-radius:30px;overflow:hidden;box-shadow:0 22px 70px rgba(0,0,0,.14);min-height:520px;display:flex;align-items:center;justify-content:center}
    .main-photo img{width:100%;height:100%;min-height:520px;object-fit:cover;object-position:center top;display:block}
    .thumbs{display:flex;gap:10px;overflow:auto;padding:12px 2px}
    .thumbs img{width:76px;height:100px;object-fit:cover;border-radius:14px;border:2px solid transparent;cursor:pointer;flex:0 0 auto;background:#111}
    .thumbs img.active{border-color:var(--gold)}
    .info{background:#fff;border-radius:30px;padding:30px;box-shadow:0 22px 70px rgba(0,0,0,.08)}
    .eyebrow{color:var(--gold);font-weight:900;letter-spacing:.22em;font-size:12px;text-transform:uppercase;margin-bottom:10px}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,6vw,72px);line-height:.95;margin-bottom:16px}
    .desc{color:#595959;font-size:17px;margin-bottom:22px}
    .specs{display:grid;gap:12px;margin:24px 0}
    .spec{border:1px solid #eee;border-radius:18px;padding:15px;background:#fafafa}
    .spec strong{display:block;color:#111;margin-bottom:3px}
    .spec span{color:#666}
    .btns{display:grid;gap:12px;margin-top:24px}
    .btn{display:flex;align-items:center;justify-content:center;border-radius:18px;padding:16px 18px;text-decoration:none;font-weight:900}
    .gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
    .dark{background:#050505;color:#fff}
    .detail{margin-top:24px;color:#555;white-space:pre-wrap}
    @media(max-width:820px){
      .grid{grid-template-columns:1fr;gap:20px}
      .wrap{padding-top:22px}
      .main-photo{min-height:420px;border-radius:24px}
      .main-photo img{min-height:420px}
      .info{padding:22px;border-radius:24px}
    }
  </style>
</head>
<body>
  <header class="top"><a href="./index.html">ANGEL PRIVÉ</a></header>
  <main class="wrap">
    <a class="back" href="./index.html">← Ana sayfaya dön</a>
    <section class="grid">
      <div>
        <div class="main-photo"><img id="mainPhoto" alt="Ürün görseli"></div>
        <div class="thumbs" id="thumbs"></div>
      </div>
      <div class="info">
        <div class="eyebrow" id="category">Özel dikim</div>
        <h1 id="title">Ürün yükleniyor...</h1>
        <p class="desc" id="desc"></p>

        <div class="specs">
          <div class="spec"><strong>Kumaş cinsi</strong><span id="fabric">-</span></div>
          <div class="spec"><strong>Kalıp / model</strong><span id="model">-</span></div>
          <div class="spec"><strong>Ölçü bilgisi</strong><span id="measure">-</span></div>
          <div class="spec"><strong>Teslim süresi</strong><span id="delivery">-</span></div>
        </div>

        <div class="detail" id="detail"></div>

        <div class="btns">
          <a class="btn gold" id="waBtn" href="#" target="_blank">Bu ürün için teklif al</a>
          <a class="btn dark" href="./index.html">Diğer tasarımları incele</a>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./urun.js"></script>
</body>
</html>
